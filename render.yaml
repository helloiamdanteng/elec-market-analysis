# Render Blueprint — web dashboard + scheduled ingest + Postgres.
# The web service only reads aggregates; the cron job keeps data current.
# Initial backfill is run once manually (see README).

databases:
  - name: elec-db
    databaseName: elec
    plan: basic-256mb        # adjust tier in the Render dashboard if needed

services:
  - type: web
    name: elec-market-analysis
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elec-db
          property: connectionString
      - key: REGION
        value: NSW1
      - key: PYTHON_VERSION
        value: "3.11.9"

  - type: cron
    name: elec-ingest
    runtime: python
    schedule: "30 18 * * *"   # daily, ~04:30 AEST (18:30 UTC) — after the day settles
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python ingest.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elec-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
