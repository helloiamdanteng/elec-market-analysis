services:
  - type: web
    name: asx-elec-futures
    runtime: python
    plan: starter
    buildCommand: "pip install -r requirements.txt && python build_dataset.py --region NSW1 --years 10"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: REGION
        value: NSW1
      - key: PYTHON_VERSION
        value: "3.11.9"
